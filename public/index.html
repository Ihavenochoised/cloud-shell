<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Browser Terminal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
    <link rel="stylesheet" href="/stylesheets/home.css" />
</head>

<body>

    <!-- Login -->
    <div id="login-screen">
        <div id="login-box">
            <h2>🔒 Terminal Login</h2>
            <input type="password" id="password-input" placeholder="Password" />
            <button id="login-btn">Connect</button>
            <div id="login-error"></div>
        </div>
    </div>

    <!-- Terminal -->
    <header>
        <div class="dot" style="background:#f38ba8"></div>
        <div class="dot" style="background:#f9e2af"></div>
        <div class="dot" style="background:#a6e3a1"></div>
        <span>Terminal</span>
        <span id="status">● Connecting…</span>
    </header>
    <div id="terminal-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
    <script src="/javascripts/home.js"></script>
</body>

</html>
